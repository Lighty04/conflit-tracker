<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConflitTracker — Réseaux d'influences</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e0e6ed;
            overflow: hidden;
        }
        #app {
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 320px;
            background: #111827;
            border-right: 1px solid #1e293b;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        #sidebar h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #f8fafc;
        }
        #sidebar .subtitle {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 24px;
        }
        .nav-tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 16px;
            background: #1e293b;
            border-radius: 8px;
            padding: 4px;
        }
        .nav-tab {
            flex: 1;
            padding: 8px 4px;
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: transparent;
            transition: all 0.15s;
        }
        .nav-tab:hover { color: #e0e6ed; }
        .nav-tab.active {
            background: #3b82f6;
            color: #fff;
            font-weight: 500;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .leaderboard-item {
            padding: 10px 12px;
            background: #1e293b;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .leaderboard-item:hover { background: #334155; }
        .leaderboard-item .rank {
            font-size: 1.25rem;
            font-weight: 700;
            color: #3b82f6;
            width: 32px;
            text-align: center;
        }
        .leaderboard-item .name {
            font-weight: 500;
            color: #f8fafc;
            font-size: 0.875rem;
        }
        .leaderboard-item .meta {
            font-size: 0.75rem;
            color: #64748b;
        }
        .leaderboard-item .score {
            font-size: 0.875rem;
            font-weight: 600;
            color: #f59e0b;
        }
        .alert-item {
            padding: 10px 12px;
            background: #1e293b;
            border-left: 3px solid #ef4444;
            border-radius: 0 8px 8px 0;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .alert-item.medium { border-left-color: #f59e0b; }
        .alert-item .alert-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #ef4444;
            font-weight: 600;
        }
        .alert-item.medium .alert-type { color: #f59e0b; }
        .alert-item .alert-msg {
            font-size: 0.8rem;
            color: #e0e6ed;
            margin-top: 2px;
        }
        .person-detail .detail-section {
            margin: 12px 0;
            padding: 12px;
            background: #1e293b;
            border-radius: 8px;
        }
        .person-detail .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .board-item {
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            font-size: 0.875rem;
        }
        .board-item:last-child { border-bottom: none; }
        .board-name { color: #f8fafc; font-weight: 500; }
        .board-role { color: #94a3b8; font-size: 0.8rem; }
        .board-amount { color: #10b981; font-size: 0.8rem; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-danger { background: #ef444420; color: #ef4444; }
        .badge-warning { background: #f59e0b20; color: #f59e0b; }
        .badge-success { background: #10b98120; color: #10b981; }
        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e0e6ed;
            font-size: 0.875rem;
            outline: none;
        }
        .search-box input:focus {
            border-color: #3b82f6;
        }
        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            margin-top: 4px;
        }
        .search-result {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            font-size: 0.875rem;
        }
        .search-result:hover {
            background: #334155;
        }
        .search-result .name {
            font-weight: 500;
            color: #f8fafc;
        }
        .search-result .type {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 20px 0;
        }
        .stat-card {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: #64748b;
        }
        #node-info {
            margin-top: 20px;
            padding: 16px;
            background: #1e293b;
            border-radius: 8px;
            display: none;
        }
        #node-info h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #f8fafc;
        }
        #node-info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #334155;
            font-size: 0.875rem;
        }
        #node-info .info-label {
            color: #64748b;
        }
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #graph-svg {
            width: 100%;
            height: 100%;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .control-btn {
            width: 40px;
            height: 40px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e0e6ed;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .control-btn:hover {
            background: #334155;
        }
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #111827;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #1e293b;
            font-size: 0.875rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-dot.person { background: #3b82f6; }
        .legend-dot.association { background: #10b981; }
        .legend-dot.institution { background: #f59e0b; }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <h1>ConflitTracker</h1>
            <div class="subtitle">Cartographie des conflits d'intérêts</div>
            
            <div class="nav-tabs">
                <button class="nav-tab active" data-panel="graph-panel" onclick="switchPanel('graph-panel')">Réseau</button>
                <button class="nav-tab" data-panel="leaderboard-panel" onclick="switchPanel('leaderboard-panel')">Top</button>
                <button class="nav-tab" data-panel="alerts-panel" onclick="switchPanel('alerts-panel')">Alertes</button>
            </div>
            
            <div class="panel active" id="graph-panel">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Rechercher une personne, association..." autocomplete="off">
                    <div class="search-results" id="search-results"></div>
                </div>
                
                <div class="stats" id="stats">
                    <div class="stat-card">
                        <div class="number" id="stat-nodes">-</div>
                        <div class="label">Nœuds</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="stat-edges">-</div>
                        <div class="label">Liens</div>
                    </div>
                </div>
                
                <div id="node-info">
                    <h3 id="info-name"></h3>
                    <div class="info-row">
                        <span class="info-label">Type</span>
                        <span id="info-type"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Budget total</span>
                        <span id="info-budget"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Rôle</span>
                        <span id="info-role"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Source</span>
                        <span id="info-source"></span>
                    </div>
                </div>
            </div>
            
            <div class="panel" id="leaderboard-panel">
                <div style="margin-bottom:12px;">
                    <select id="leaderboard-metric" onchange="loadLeaderboard()" style="width:100%;padding:8px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e0e6ed;font-size:0.875rem;">
                        <option value="conflict_score">Score de conflit</option>
                        <option value="total_subventions_controlled">Subventions contrôlées</option>
                        <option value="board_count">Nombre de CA</option>
                    </select>
                </div>
                <div id="leaderboard-list"></div>
            </div>
            
            <div class="panel" id="alerts-panel">
                <div id="alerts-list"></div>
            </div>
            
            <div class="panel" id="person-panel">
                <button onclick="switchPanel('graph-panel')" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:0.875rem;margin-bottom:12px;padding:0;">← Retour</button>
                <div id="person-detail" class="person-detail"></div>
            </div>
        </aside>
        
        <main id="graph-container">
            <svg id="graph-svg"></svg>
            <div class="loading" id="loading">Chargement du réseau...</div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot person"></div>
                    <span>Personne</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot association"></div>
                    <span>Association</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot institution"></div>
                    <span>Institution</span>
                </div>
            </div>
            
            <div class="controls">
                <button class="control-btn" id="btn-reset" title="Réinitialiser">⟲</button>
                <button class="control-btn" id="btn-zoom-in" title="Zoom +">+</button>
                <button class="control-btn" id="btn-zoom-out" title="Zoom −">−</button>
            </div>
        </main>
    </div>
    
    <script src="/static/js/graph.js"></script>
</body>
</html>
