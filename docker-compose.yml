version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./data/conflit_tracker.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

